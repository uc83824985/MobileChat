<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MobileChat local-first mobile chat client"
    />
    <meta name="theme-color" content="#f7f7f2" />
    <script>
      (() => {
        try {
          const raw = localStorage.getItem("mobilechat:ui-preferences");
          const preferences = raw ? JSON.parse(raw) : {};
          const themeMode = preferences.themeMode;
          if (themeMode === "light" || themeMode === "dark") {
            document.documentElement.dataset.theme = themeMode;
            document.documentElement.style.colorScheme = themeMode;
          } else {
            document.documentElement.style.colorScheme = "light dark";
          }
          if (preferences.hideMobileStatusBar === true) {
            window.MobileChatAndroid?.setStatusBarHidden?.(true);
          }
        } catch {
          document.documentElement.style.colorScheme = "light dark";
        }
      })();
    </script>
    <title>MobileChat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
